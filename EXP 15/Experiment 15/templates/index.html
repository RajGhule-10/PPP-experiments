<!DOCTYPE html>
<html>
<head>
    <title>Score Predictor</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        input {
            padding: 10px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
        }
        h2 {
            color: green;
        }
    </style>
</head>
<body>

    <h1>Student Score Predictor</h1>

    <form method="POST">
        <input type="number" step="any" name="hours" placeholder="Enter study hours" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction is not none %}
        <h2>Predicted Score: {{ prediction }}</h2>
    {% endif %}

</body>
</html>
