<!DOCTYPE html>
<html>
<head>
    <title>Bar Chart Generator</title>
</head>
<body>
    <h2>Enter 3 Values</h2>

    <form method="POST">
        <input type="number" name="value1" placeholder="Enter Value 1" required><br><br>
        <input type="number" name="value2" placeholder="Enter Value 2" required><br><br>
        <input type="number" name="value3" placeholder="Enter Value 3" required><br><br>
        <button type="submit">Generate Chart</button>
    </form>

    {% if chart %}
        <h3>Generated Bar Chart</h3>
        <img src="{{ url_for('static', filename='chart.png') }}">
    {% endif %}
</body>
</html>
