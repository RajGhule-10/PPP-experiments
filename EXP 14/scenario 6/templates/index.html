<!DOCTYPE html>
<html>
<head>
    <title>House Price Prediction</title>
</head>
<body>
    <h2>House Price Prediction</h2>

    <form method="POST">
        <input type="text" name="area" placeholder="Enter Area"><br><br>
        <input type="text" name="bedrooms" placeholder="Enter Bedrooms"><br><br>
        <input type="text" name="age" placeholder="Enter House Age"><br><br>
        <button type="submit">Predict Price</button>
    </form>

    {% if prediction %}
        <h3>Predicted Price: {{ prediction }} Lakhs</h3>
    {% endif %}

    {% if chart %}
        <h3>Feature Contribution Visualization</h3>
        <img src="{{ url_for('static', filename='chart.png') }}">
    {% endif %}
</body>
</html>
