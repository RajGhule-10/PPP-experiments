<!DOCTYPE html>
<html>
<head>
    <title>ML Model Deployment</title>
</head>
<body>
    <h1>Iris Flower Prediction</h1>

    <form method="POST">
        <input type="text" name="f1" placeholder="Sepal Length"><br><br>
        <input type="text" name="f2" placeholder="Sepal Width"><br><br>
        <input type="text" name="f3" placeholder="Petal Length"><br><br>
        <input type="text" name="f4" placeholder="Petal Width"><br><br>
        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <h2>Prediction: {{ prediction }}</h2>
    {% endif %}

    {% if error %}
        <h3 style="color:red;">{{ error }}</h3>
    {% endif %}

    {% if plot_path %}
        <h2>Feature Contribution Graph</h2>
        <img src="{{ plot_path }}" width="500">
    {% endif %}
</body>
</html>
